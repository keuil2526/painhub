<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painhub</title>
    <style>
        /* 기본 테마 및 레이아웃 (Dark Mode) */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1a1a1a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff9900;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
        }

        .logo span {
            background-color: #ff9900;
            color: #000000;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }

        .search-bar {
            flex-grow: 0.5;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #2b2b2b;
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background-color: #ff9900;
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #e68a00;
        }

        .btn-secondary {
            background-color: #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background-color: #444;
        }

        /* 비디오 그리드 레이아웃 */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card {
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #222;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: #ff9900;
        }

        .thumbnail-placeholder {
            width: 100%;
            height: 160px;
            background-color: #2b2b2b;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 14px;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            font-size: 13px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        /* 모달(Modal) 공통 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #ff9900;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #ff9900;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #2b2b2b;
            color: white;
        }

        /* 비디오 플레이어 모달 전용 스타일 */
        .player-content {
            background-color: #111;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            border: 1px solid #333;
        }

        .player-content video {
            width: 100%;
            max-height: 450px;
            border-radius: 4px;
            background-color: #000;
        }

        .player-details {
            margin-top: 15px;
        }

        .player-details h3 {
            margin: 0 0 10px 0;
            color: #ff9900;
        }

        .player-details p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 댓글 영역 */
        .comment-section {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .comment-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .comment-input-area input {
            flex-grow: 1;
            padding: 8px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        .comment-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }

        .comment-author {
            font-weight: bold;
            color: #ff9900;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Pain<span>hub</span></a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="동영상 제목 검색...">
        </div>
        <div class="nav-buttons" id="navButtons">
            </div>
    </header>

    <div class="container">
        <div class="video-grid" id="videoGrid">
            </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>로그인</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('loginModal')">취소</button>
                    <button type="submit" class="btn">로그인</button>
                </div>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>회원가입</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('registerModal')">취소</button>
                    <button type="submit" class="btn">가입 완료</button>
                </div>
            </form>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2>동영상 업로드</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>동영상 제목</label>
                    <input type="text" id="videoTitle" name="videoTitle" required>
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <textarea id="videoDesc" name="videoDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>동영상 파일 선택</label>
                    <input type="file" id="videoFile" name="videoFile" accept="video/*" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('uploadModal')">취소</button>
                    <button type="submit" class="btn">업로드 시작</button>
                </div>
            </form>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="player-content">
            <video id="mainVideoPlayer" controls autoplay></video>
            <div class="player-details">
                <h3 id="playerTitle">동영상 제목</h3>
                <p id="playerDesc">동영상 설명이 들어가는 곳입니다.</p>
                
                <div style="display: flex; gap: 15px; align-items: center; margin-top: 10px;">
                    <span id="playerAuthor" style="font-weight: bold; color: #ff9900;">작성자</span>
                    <button id="likeBtn" class="btn btn-secondary" style="font-size: 12px; padding: 5px 10px;">추천 <span id="likeCount">0</span></button>
                </div>

                <div class="comment-section">
                    <h4>댓글</h4>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="공개 댓글 추가...">
                        <button id="submitCommentBtn" class="btn" style="padding: 5px 15px;">등록</button>
                    </div>
                    <div class="comment-list" id="commentList">
                        </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
                <button id="deleteVideoBtn" class="btn" style="background-color: #cc0000; color: white; display: none;">삭제하기</button>
                <button id="downloadVideoBtn" class="btn" style="background-color: #007bff; color: white;">다운로드</button>
                <button id="closePlayerBtn" class="btn btn-secondary" onclick="closePlayer()">닫기</button>
            </div>
        </div>
    </div>


    <script>
        let allVideos = [];
        let currentPlayingVideo = null;

        const navButtons = document.getElementById('navButtons');
        const videoGrid = document.getElementById('videoGrid');
        const searchInput = document.getElementById('searchInput');

        const playerModal = document.getElementById('playerModal');
        const mainVideoPlayer = document.getElementById('mainVideoPlayer');
        const playerTitle = document.getElementById('playerTitle');
        const playerDesc = document.getElementById('playerDesc');
        const playerAuthor = document.getElementById('playerAuthor');
        const likeCount = document.getElementById('likeCount');
        const likeBtn = document.getElementById('likeBtn');
        const deleteVideoBtn = document.getElementById('deleteVideoBtn');
        const downloadVideoBtn = document.getElementById('downloadVideoBtn');

        const commentInput = document.getElementById('commentInput');
        const submitCommentBtn = document.getElementById('submitCommentBtn');
        const commentList = document.getElementById('commentList');

        // 초기 구동 세팅
        window.addEventListener('DOMContentLoaded', () => {
            renderHeaderButtons();
            loadVideos();
        });

        // 1. 로그인 상태에 대응한 헤더 메뉴 렌더링
        function renderHeaderButtons() {
            const username = localStorage.getItem('username');
            if (username) {
                navButtons.innerHTML = `
                    <span style="font-weight:bold; color:#ff9900;">${username}님 환영합니다!</span>
                    <button class="btn" onclick="openModal('uploadModal')">업로드</button>
                    <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
                `;
            } else {
                navButtons.innerHTML = `
                    <button class="btn" onclick="openModal('loginModal')">로그인</button>
                    <button class="btn btn-secondary" onclick="openModal('registerModal')">회원가입</button>
                `;
            }
        }

        // 모달 제어 함수
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            alert("로그아웃 되었습니다.");
            location.reload();
        }

        // 2. 비디오 데이터 피드 조회 및 출력
        async function loadVideos() {
            try {
                const res = await fetch('/api/videos');
                allVideos = await res.json();
                displayVideos(allVideos);
            } catch (err) {
                console.error("비디오를 불러오는 과정에서 오류가 발생했습니다.", err);
            }
        }

        function displayVideos(videos) {
            videoGrid.innerHTML = '';
            if (videos.length === 0) {
                videoGrid.innerHTML = '<p style="color: #666; text-align: center; grid-column: 1/-1; margin-top: 50px;">등록된 동영상이 없습니다.</p>';
                return;
            }

            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <div class="video-info">
                        <p class="video-title">${video.title}</p>
                        <div class="video-meta">
                            <span>by ${video.username}</span>
                            <span>추천 ${video.likeCount}</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openPlayer(video));
                videoGrid.appendChild(card);
            });
        }

        // 실시간 타이핑 기반 비디오 검색 필터링
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allVideos.filter(video => 
                video.title.toLowerCase().includes(query) || 
                (video.desc && video.desc.toLowerCase().includes(query))
            );
            displayVideos(filtered);
        });

        // 3. 비디오 전용 미디어 플레이어 팝업 열기
        async function openPlayer(video) {
            currentPlayingVideo = video;
            mainVideoPlayer.src = video.filepath;
            playerTitle.textContent = video.title;
            playerDesc.textContent = video.desc || '설명이 기재되어 있지 않습니다.';
            playerAuthor.textContent = `게시자: ${video.username}`;
            likeCount.textContent = video.likeCount;
            
            // 삭제 제어 조건 판별 (글쓴이 본인이거나, 어드민 계정이거나, 관리자 등급 보유)
            const currentUser = localStorage.getItem('username');
            const userRole = localStorage.getItem('role');

            if (currentUser && (currentUser === video.username || currentUser === 'Admin' || userRole === 'admin')) {
                deleteVideoBtn.style.display = 'inline-block';
            } else {
                deleteVideoBtn.style.display = 'none';
            }

            loadComments(video.id);
            playerModal.style.display = 'flex';
        }

        function closePlayer() {
            mainVideoPlayer.pause();
            mainVideoPlayer.src = "";
            playerModal.style.display = 'none';
            currentPlayingVideo = null;
        }

        // 4. 회원가입 처리
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message);
            if (data.success) closeModal('registerModal');
        });

        // 5. 로그인 처리 (계정 권한인 role 보관 포함)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role); // 'admin' 혹은 'user' 값 저장
                alert(data.message);
                location.reload();
            } else {
                alert(data.message);
            }
        });

        // 6. 비디오 클립 업로드 처리
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = localStorage.getItem('username');
            if (!username) {
                alert("업로드를 진행하려면 로그인이 선행되어야 합니다.");
                return;
            }

            const formData = new FormData();
            formData.append('videoTitle', document.getElementById('videoTitle').value);
            formData.append('videoDesc', document.getElementById('videoDesc').value);
            formData.append('videoFile', document.getElementById('videoFile').files[0]);
            formData.append('username', username);

            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            alert(data.message);
            if (data.success) {
                closeModal('uploadModal');
                loadVideos();
            }
        });

        // 7. 추천 (좋아요) 토글 연산 처리
        likeBtn.addEventListener('click', async () => {
            const username = localStorage.getItem('username');
            if (!username) {
                alert("추천 기능은 로그인 시에만 사용할 수 있습니다.");
                return;
            }

            const res = await fetch('/api/like', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoId: currentPlayingVideo.id, username })
            });
            const data = await res.json();
            
            if (data.action === 'like') {
                currentPlayingVideo.likeCount += 1;
            } else if (data.action === 'unlike') {
                currentPlayingVideo.likeCount = Math.max(0, currentPlayingVideo.likeCount - 1);
            }
            likeCount.textContent = currentPlayingVideo.likeCount;
            loadVideos(); // 메인 피드 목록 업데이트
        });

        // 8. 덧글 리스트 읽기
        async function loadComments(videoId) {
            const res = await fetch(`/api/comments/${videoId}`);
            const comments = await res.json();
            commentList.innerHTML = '';
            comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<span class="comment-author">${c.username}</span> ${c.content}`;
                commentList.appendChild(div);
            });
        }

        // 덧글 기재 등록
        submitCommentBtn.addEventListener('click', async () => {
            const username = localStorage.getItem('username');
            const content = commentInput.value.trim();
            if (!username) {
                alert("댓글을 기재하려면 로그인을 진행해 주세요.");
                return;
            }
            if (!content) return;

            const res = await fetch('/api/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoId: currentPlayingVideo.id, username, content })
            });
            const data = await res.json();
            if (data.success) {
                commentInput.value = '';
                loadComments(currentPlayingVideo.id);
            }
        });

        // 👑 9. 동영상 삭제 처리 API 바인딩
        deleteVideoBtn.addEventListener('click', async () => {
            if (!currentPlayingVideo) return;

            const confirmAction = confirm("해당 동영상을 완전히 삭제하시겠습니까? (이 조작은 물리 동영상 파일까지 완전히 소거 처리합니다.)");
            if (!confirmAction) return;

            const currentUser = localStorage.getItem('username');

            try {
                const res = await fetch(`/api/videos/${currentPlayingVideo.id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                const result = await res.json();

                if (result.success) {
                    alert(result.message);
                    closePlayer();
                    loadVideos(); // 피드 갱신
                } else {
                    alert(result.message || "삭제 명령 연산 중 에러");
                }
            } catch (err) {
                console.error(err);
                alert("동영상 삭제 과정에서 치명적 서버 응답 유실");
            }
        });

        // 📥 10. 동영상 다운로드 기능 구현
        downloadVideoBtn.addEventListener('click', () => {
            if (!currentPlayingVideo) return;

            const fileUrl = currentPlayingVideo.filepath;
            const fileName = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);

            const link = document.createElement('a');
            link.href = fileUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
